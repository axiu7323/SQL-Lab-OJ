services:
  mysql:
    image: mysql:8.0
    container_name: sql-lab-oj-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sql_lab_oj}
      MYSQL_USER: ${MYSQL_USER:-sqloj}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sqloj_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
      - ./docker/mysql/03-grant-sandbox.sql:/docker-entrypoint-initdb.d/03-grant-sandbox.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sql-lab-oj

  redis:
    image: redis:7-alpine
    container_name: sql-lab-oj-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sql-lab-oj

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sql-lab-oj-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      SQL_OJ_DB_URL: jdbc:mysql://mysql:3306/sql_lab_oj?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SQL_OJ_DB_USERNAME: ${MYSQL_USER:-sqloj}
      SQL_OJ_DB_PASSWORD: ${MYSQL_PASSWORD:-sqloj_password}
      SQL_OJ_REDIS_HOST: redis
      SQL_OJ_REDIS_PORT: 6379
      SQL_OJ_REDIS_PASSWORD: ""
      SQL_OJ_REDIS_DATABASE: 0
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sql-lab-oj

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sql-lab-oj-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - sql-lab-oj

volumes:
  mysql_data:
  redis_data:

networks:
  sql-lab-oj:
    driver: bridge
